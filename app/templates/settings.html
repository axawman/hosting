{% if user %}
<div class="offcanvas offcanvas-end" tabindex="-1" id="settingsPanel" aria-labelledby="settingsPanelTitle">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="settingsPanelTitle">Настройки</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <div class="mb-4">
            <div class="fw-bold">{{ user.email }}</div>
            {% if user.is_admin %}
                <div class="text-muted">Аккаунт администратора</div>
            {% else %}
                <div class="text-muted">Пользовательский аккаунт</div>
            {% endif %}
        </div>

        <form action="/logout" method="POST" class="mt-auto">
            <button type="submit" class="btn btn-outline-danger w-100">Выйти из аккаунта</button>
        </form>
    </div>
</div>
{% endif %}
